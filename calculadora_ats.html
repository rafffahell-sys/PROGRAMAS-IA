<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora de ATS - Servidores</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: rgba(17, 24, 39, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --primary: #6366f1;
      --primary-glow: rgba(99, 102, 241, 0.35);
      --success: #10b981;
      --success-glow: rgba(16, 185, 129, 0.25);
      --warning: #f59e0b;
      --warning-glow: rgba(245, 158, 11, 0.25);
      --danger: #ef4444;
      --danger-glow: rgba(239, 68, 68, 0.25);
      --info: #06b6d4;
      --info-glow: rgba(6, 182, 212, 0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-font-smoothing: antialiased; }

    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.05) 0%, transparent 40%);
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 580px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.02);
      transition: all 0.2s;
      align-self: flex-start;
    }

    .back-button:hover {
      color: var(--text-primary);
      border-color: rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a5b4fc 0%, #38bdf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .section-title {
      color: var(--info);
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .field-row {
      display: flex;
      align-items: center;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 12px;
      gap: 10px;
    }

    .field-row label {
      min-width: 140px;
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 600;
    }

    .field-row input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      padding: 4px 0;
      color-scheme: dark;
    }

    .field-row input::placeholder { color: #555; }

    .field-row input[type="date"]::-webkit-calendar-picker-indicator {
      cursor: pointer;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border-color);
      margin: 20px 0;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-calcular { background: var(--primary); color: #fff; }
    .btn-calcular:hover { background: #4f46e5; box-shadow: 0 0 15px var(--primary-glow); }
    
    .btn-limpar   { background: rgba(255, 255, 255, 0.05); color: var(--text-primary); border: 1px solid var(--border-color); }
    .btn-limpar:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); }

    .result-label {
      color: var(--text-primary);
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    #resultado {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 14px;
      font-family: Consolas, monospace;
      font-size: 0.88rem;
      color: var(--text-primary);
      white-space: pre-wrap;
      min-height: 80px;
      line-height: 1.7;
    }

    footer {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      text-align: center;
      padding: 12px;
      font-size: 0.8rem;
      font-weight: 600;
      border-radius: 12px;
    }

    .erro { color: var(--danger); font-weight: 600; }
  </style>
</head>
<body>

<div class="container">
  <a href="index.html" class="back-button">← Voltar ao Portal</a>

  <h1>📊 Calculadora de ATS</h1>

  <div class="card">
    <div class="section-title">📅 Período de Trabalho</div>

    <div class="field-row">
      <label>Data de Início:</label>
      <input type="date" id="dataInicio"/>
    </div>

    <div class="field-row">
      <label>Data de Fim:</label>
      <input type="date" id="dataFim"/>
    </div>

    <hr class="divider"/>

    <div class="section-title">⚙️ Ajustes (Opcional)</div>

    <div class="field-row">
      <label>Dias Averbados:</label>
      <input type="number" id="averbados" placeholder="0" min="0"/>
    </div>

    <div class="field-row">
      <label>Dias a Descontar:</label>
      <input type="number" id="descontar" placeholder="0" min="0"/>
    </div>

    <div class="btn-row">
      <button class="btn-calcular" onclick="calcular()">🧮 Calcular</button>
      <button class="btn-limpar"   onclick="limpar()">🗑️ Limpar</button>
    </div>

    <div class="result-label">📋 Resultado:</div>
    <div id="resultado"></div>
  </div>

  <footer>
    💡 Formato: DD/MM/AAAA • Desenvolvido por Rafael F. Lima, via Google Gemini Antigravity IA Agent.
  </footer>
</div>

  <script>
    function calcular() {
      const inicioVal = document.getElementById('dataInicio').value;
      const fimVal    = document.getElementById('dataFim').value;
      const resultDiv = document.getElementById('resultado');

      if (!inicioVal || !fimVal) {
        resultDiv.innerHTML = '<span class="erro">⚠️ Por favor, preencha as datas de início e fim.</span>';
        return;
      }

      const inicio = new Date(inicioVal + 'T00:00:00');
      const fim    = new Date(fimVal    + 'T00:00:00');

      if (fim < inicio) {
        resultDiv.innerHTML = '<span class="erro">⚠️ A data final deve ser posterior à data inicial.</span>';
        return;
      }

      const msPerDay     = 1000 * 60 * 60 * 24;
      const diasEfetivos = Math.round((fim - inicio) / msPerDay);
      const acrescimos   = parseInt(document.getElementById('averbados').value) || 0;
      const descontos    = parseInt(document.getElementById('descontar').value)  || 0;
      const diasTotais   = diasEfetivos + acrescimos - descontos;

      if (diasTotais < 0) {
        resultDiv.innerHTML = '<span class="erro">⚠️ Total de dias negativos após ajustes. Verifique os valores.</span>';
        return;
      }

      let linhas = [];
      linhas.push(`📅 Período bruto: ${diasEfetivos} dias`);
      if (acrescimos) linhas.push(`➕ Dias Averbados: ${acrescimos}`);
      if (descontos)  linhas.push(`➖ Dias a Descontar: ${descontos}`);
      if (acrescimos || descontos) linhas.push(`📊 Total ajustado: ${diasTotais} dias`);

      let ats, proximoInfo;

      if (diasTotais < 12045) {
        const trienios     = Math.floor(diasTotais / 1095);
        ats                = trienios * 5;
        const diasNec      = (trienios + 1) * 1095;
        const diasRest     = diasNec - diasTotais;
        const dataProximo  = new Date(fim.getTime() + diasRest * msPerDay);
        proximoInfo = `📈 Próximo triênio (${ats + 5}%) em: ${formatarData(dataProximo)}`;
      } else if (diasTotais < 12410) {
        ats = 55;
        const diasPos11 = diasTotais - 12045;
        if (diasPos11 >= 365) {
          ats = 60;
          proximoInfo = '✅ ATS máximo atingido: 60%';
        } else {
          const faltam      = 365 - diasPos11;
          const dataProximo = new Date(fim.getTime() + faltam * msPerDay);
          proximoInfo = `📈 Último aumento (60%) em: ${formatarData(dataProximo)}`;
        }
      } else {
        ats = 60;
        proximoInfo = '✅ ATS máximo atingido: 60%';
      }

      linhas.push(`💰 ATS atual: ${ats}%`);
      linhas.push(proximoInfo);
      linhas.push('━'.repeat(46));
      linhas.push('🛠️ Desenvolvido via GEMINI IA, por Rafael F. Lima');
      linhas.push('━'.repeat(46));

      resultDiv.textContent = linhas.join('\n');
    }

    function formatarData(date) {
      const d = String(date.getDate()).padStart(2, '0');
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const y = date.getFullYear();
      return `${d}/${m}/${y}`;
    }

    function limpar() {
      document.getElementById('dataInicio').value  = '';
      document.getElementById('dataFim').value     = '';
      document.getElementById('averbados').value   = '';
      document.getElementById('descontar').value   = '';
      document.getElementById('resultado').textContent = '';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') calcular();
    });
  </script>

</body>
</html>
