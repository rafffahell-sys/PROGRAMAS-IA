<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoria de Matrículas Repetidas</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
          --bg-color: #0b0f19;
          --card-bg: rgba(17, 24, 39, 0.7);
          --border-color: rgba(255, 255, 255, 0.08);
          --text-primary: #f3f4f6;
          --text-secondary: #9ca3af;
          --primary: #6366f1;
          --primary-glow: rgba(99, 102, 241, 0.35);
          --success: #10b981;
          --success-glow: rgba(16, 185, 129, 0.25);
          --warning: #f59e0b;
          --warning-glow: rgba(245, 158, 11, 0.25);
          --danger: #ef4444;
          --danger-glow: rgba(239, 68, 68, 0.25);
          --info: #06b6d4;
          --info-glow: rgba(6, 182, 212, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-font-smoothing: antialiased; }

        body {
          background-color: var(--bg-color);
          color: var(--text-primary);
          min-height: 100vh;
          background-image: 
            radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
            radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.05) 0%, transparent 40%);
          background-attachment: fixed;
          display: flex;
          flex-direction: column;
          align-items: center;
          padding: 40px 20px;
        }

        .container {
          width: 100%;
          max-width: 900px;
          display: flex;
          flex-direction: column;
          gap: 1.5rem;
        }

        .back-button {
          display: inline-flex;
          align-items: center;
          gap: 0.5rem;
          color: var(--text-secondary);
          text-decoration: none;
          font-size: 0.9rem;
          padding: 0.5rem 1rem;
          border: 1px solid var(--border-color);
          border-radius: 10px;
          background: rgba(255, 255, 255, 0.02);
          transition: all 0.2s;
          align-self: flex-start;
        }

        .back-button:hover {
          color: var(--text-primary);
          border-color: rgba(255, 255, 255, 0.2);
          background: rgba(255, 255, 255, 0.05);
        }

        .card {
          background: var(--card-bg);
          border: 1px solid var(--border-color);
          border-radius: 16px;
          padding: 30px;
          backdrop-filter: blur(12px);
          box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
          font-size: 1.8rem;
          font-weight: 800;
          background: linear-gradient(135deg, #a5b4fc 0%, #38bdf8 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          letter-spacing: -0.5px;
          text-align: center;
          margin-bottom: 0.5rem;
        }

        p.subtitle {
          text-align: center;
          font-size: 0.9em;
          color: var(--text-secondary);
          margin-bottom: 1rem;
        }

        hr {
          border: none;
          border-top: 1px solid var(--border-color);
          margin: 20px 0;
        }

        .flex-container {
          display: flex;
          gap: 20px;
          margin-bottom: 20px;
        }

        .column {
          flex: 1;
          display: flex;
          flex-direction: column;
        }

        .column label {
          font-weight: 700;
          margin-bottom: 10px;
          color: var(--info);
          text-transform: uppercase;
          font-size: 0.85rem;
          letter-spacing: 0.5px;
        }

        textarea {
          width: 100%;
          height: 250px;
          background-color: rgba(0,0,0,0.2);
          color: white;
          border: 1px solid var(--border-color);
          border-radius: 8px;
          padding: 12px;
          font-family: monospace;
          resize: vertical;
          box-sizing: border-box;
          outline: none;
        }

        textarea:focus {
          border-color: var(--primary);
        }

        .buttons {
          text-align: center;
          margin-bottom: 20px;
          display: flex;
          gap: 10px;
          justify-content: center;
        }

        button {
          padding: 10px 20px;
          border: none;
          border-radius: 8px;
          font-weight: 700;
          font-size: 0.9rem;
          cursor: pointer;
          transition: all 0.2s;
        }

        .btn-green {
          background-color: var(--primary);
          color: white;
        }

        .btn-green:hover {
          background-color: #4f46e5;
          box-shadow: 0 0 15px var(--primary-glow);
        }

        .btn-clear {
          background-color: rgba(255, 255, 255, 0.05);
          color: var(--text-primary);
          border: 1px solid var(--border-color);
        }

        .btn-clear:hover {
          background-color: rgba(255, 255, 255, 0.1);
          border-color: rgba(255, 255, 255, 0.2);
        }

        #output {
          background-color: rgba(0,0,0,0.25);
          color: var(--text-primary);
          padding: 15px;
          border: 1px solid var(--border-color);
          border-radius: 8px;
          min-height: 150px;
          white-space: pre-wrap;
          font-family: monospace;
          font-size: 14px;
          line-height: 1.5;
        }

        .footer {
          text-align: center;
          color: var(--text-secondary);
          font-size: 0.8rem;
          margin-top: 10px;
          font-weight: 600;
        }

        /* Responsividade para telas menores */
        @media (max-width: 768px) {
            .flex-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-button">← Voltar ao Portal</a>

        <div class="card">
            <h2>Auditoria de Matrículas Repetidas - Férias</h2>
            <p class="subtitle">Objetivo: Identificar matrículas lançadas em ambos os sistemas simultaneamente</p>
            <hr>

            <div class="flex-container">
                <div class="column">
                    <label for="mentorh">Férias MENTORH</label>
                    <textarea id="mentorh" placeholder="Cole as matrículas do MENTORH (uma por linha)"></textarea>
                </div>
                <div class="column">
                    <label for="dap">Férias DAP</label>
                    <textarea id="dap" placeholder="Cole as matrículas do DAP (uma por linha)"></textarea>
                </div>
            </div>

            <div class="buttons">
                <button class="btn-green" onclick="verificarRepetidas()">Verificar Repetidas</button>
                <button class="btn-clear" onclick="limparTudo()">Limpar Tudo</button>
            </div>

            <div id="output">Os resultados da auditoria aparecerão aqui...</div>

            <hr>
            <div class="footer">
                Desenvolvido por Rafael F. Lima, via Google Gemini Antigravity IA Agent.
            </div>
        </div>
    </div>

    <script>
        function verificarRepetidas() {
            // Captura os valores dos textareas
            const mentorhStr = document.getElementById('mentorh').value;
            const dapStr = document.getElementById('dap').value;

            // Função auxiliar para transformar texto em array limpo
            const processarLista = (texto) => {
                return texto.split('\n')
                            .map(item => item.trim())
                            .filter(item => item !== '');
            };

            const mentorhList = processarLista(mentorhStr);
            const dapList = processarLista(dapStr);

            // Transforma em Sets para operações de conjunto
            const setMentorh = new Set(mentorhList);
            const setDap = new Set(dapList);

            // Lógica de interseção e diferença
            const repetidas = [...setMentorh].filter(x => setDap.has(x)).sort();
            const apenasMentorh = [...setMentorh].filter(x => !setDap.has(x)).sort();
            const apenasDap = [...setDap].filter(x => !setMentorh.has(x)).sort();

            // Montagem do resultado (idêntico ao Python)
            let resultado = `🔍 RESULTADOS DA AUDITORIA:\n`;
            resultado += `✅ Total de matrículas no MENTORH: ${mentorhList.length}\n`;
            resultado += `✅ Total de matrículas no DAP: ${dapList.length}\n\n`;

            resultado += `⚠️ MATRÍCULAS REPETIDAS (em ambos): ${repetidas.length}\n`;
            if (repetidas.length > 0) {
                resultado += `    🔸 ${repetidas.join(', ')}\n`;
            }

            resultado += `\nℹ️ Matrículas APENAS no MENTORH: ${apenasMentorh.length}\n`;
            resultado += `ℹ️ Matrículas APENAS no DAP: ${apenasDap.length}\n\n`;

            resultado += `📋 Lista completa de exclusivas MENTORH:\n`;
            if (apenasMentorh.length < 50) {
                resultado += `${apenasMentorh.join(', ') || 'Nenhuma'}\n\n`;
            } else {
                resultado += `(Lista muito grande - ${apenasMentorh.length} itens)\n\n`;
            }

            resultado += `📋 Lista completa de exclusivas DAP:\n`;
            if (apenasDap.length < 50) {
                resultado += `${apenasDap.join(', ') || 'Nenhuma'}\n`;
            } else {
                resultado += `(Lista muito grande - ${apenasDap.length} itens)\n`;
            }

            // Exibe o resultado na tela
            document.getElementById('output').textContent = resultado;
        }

        function limparTudo() {
            document.getElementById('mentorh').value = '';
            document.getElementById('dap').value = '';
            document.getElementById('output').textContent = 'Os resultados da auditoria aparecerão aqui...';
        }
    </script>

</body>
</html>
