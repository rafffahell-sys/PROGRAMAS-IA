<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito - Portal Folha</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at top, #121827, #0b0f19 55%);
            color: #e5e7eb;
            font-family: Arial, sans-serif;
        }
        .card {
            width: min(420px, calc(100vw - 32px));
            background: rgba(17, 24, 39, 0.92);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,.35);
        }
        h1 { margin: 0 0 8px; font-size: 28px; }
        p { margin: 0 0 20px; color: #9ca3af; }
        input, button {
            width: 100%;
            box-sizing: border-box;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.12);
            padding: 14px 16px;
            font-size: 16px;
        }
        input { background: rgba(0,0,0,.18); color: #fff; outline: none; margin-bottom: 14px; }
        button {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }
        .error { min-height: 20px; color: #fca5a5; margin-top: 10px; }
        .hint { font-size: 12px; color: #94a3b8; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Portal de Ferramentas</h1>
        <p>Identifique-se para acessar os painéis.</p>
        <input id="password" type="password" placeholder="Digite sua senha..." autofocus>
        <button id="enter">Entrar</button>
        <div class="error" id="error"></div>
        <div class="hint">Após validar, vocę será levado direto ao painel pessoal.</div>
    </div>

    <script>
        const VALID_PASSWORD = 'rafael';
        const passwordEl = document.getElementById('password');
        const errorEl = document.getElementById('error');
        const enterBtn = document.getElementById('enter');

        function login() {
            const value = (passwordEl.value || '').trim();
            if (value !== VALID_PASSWORD) {
                errorEl.textContent = 'Senha incorreta.';
                return;
            }

            sessionStorage.setItem('mppa_session_active', '1');
            localStorage.setItem('mppa_username', 'rafael');
            window.location.replace('./painel_pessoal.html');
        }

        enterBtn.addEventListener('click', login);
        passwordEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
